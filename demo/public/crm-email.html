<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SilverOS CRM — Passenger Email</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1923; color: #e2e8f0; display: flex; height: 100vh; }
    .sidebar { width: 200px; background: #1a2332; border-right: 1px solid #2d3748; padding: 16px 0; flex-shrink: 0; }
    .sidebar h2 { font-size: 14px; padding: 0 16px 12px; color: #a0aec0; border-bottom: 1px solid #2d3748; margin-bottom: 8px; }
    .sidebar-item { padding: 8px 16px; font-size: 13px; color: #a0aec0; cursor: pointer; }
    .sidebar-item:hover { background: rgba(99,179,237,0.08); color: #e2e8f0; }
    .sidebar-item.active { background: rgba(124,111,247,0.15); color: #7c6ff7; border-left: 3px solid #7c6ff7; }
    .main { flex: 1; display: flex; flex-direction: column; }
    .main-header { padding: 16px 24px; border-bottom: 1px solid #2d3748; }
    .main-header h1 { font-size: 18px; font-weight: 600; }
    .compose { flex: 1; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    .compose .form-group { display: flex; flex-direction: column; gap: 4px; }
    .compose label { font-size: 11px; color: #a0aec0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .compose input, .compose textarea {
      background: #1a2332; border: 1px solid #2d3748; border-radius: 8px; padding: 10px 12px;
      color: #e2e8f0; font-size: 14px; font-family: inherit; outline: none;
    }
    .compose input:focus, .compose textarea:focus { border-color: #7c6ff7; }
    .compose textarea { flex: 1; min-height: 200px; resize: vertical; }
    .actions { display: flex; gap: 8px; padding: 16px 24px; border-top: 1px solid #2d3748; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-send { background: #7c6ff7; color: white; }
    .btn-send:hover { opacity: 0.9; }
    .btn-send.sent { background: #48bb78; cursor: default; }
    .btn-draft { background: #2d3748; color: #a0aec0; }
    .confirmation-banner {
      display: none; background: rgba(72,187,120,0.1); border: 1px solid rgba(72,187,120,0.3);
      border-radius: 8px; padding: 12px 16px; margin: 0 24px; color: #48bb78; font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>SilverOS CRM</h2>
    <div class="sidebar-item">Inbox</div>
    <div class="sidebar-item">Sent</div>
    <div class="sidebar-item">Drafts</div>
    <div class="sidebar-item active">Service Recovery</div>
  </div>

  <div class="main">
    <div class="main-header">
      <h1>Compose — Service Recovery</h1>
    </div>

    <div id="send-confirmation" class="confirmation-banner">
      Email sent successfully. A copy has been saved to your Sent folder.
    </div>

    <div class="compose">
      <div class="form-group">
        <label for="crm-email-to">To</label>
        <input id="crm-email-to" type="email" placeholder="passenger@email.com" />
      </div>
      <div class="form-group">
        <label for="crm-email-subject">Subject</label>
        <input id="crm-email-subject" type="text" placeholder="Email subject..." />
      </div>
      <div class="form-group" style="flex:1;display:flex;flex-direction:column;">
        <label for="crm-email-body">Body</label>
        <textarea id="crm-email-body" placeholder="Compose your message..."></textarea>
      </div>
    </div>

    <div class="actions">
      <button id="btn-crm-send" class="btn btn-send">Send Email</button>
      <button class="btn btn-draft">Save Draft</button>
    </div>
  </div>

  <script>
    document.getElementById('btn-crm-send').addEventListener('click', function() {
      var btn = this;
      var banner = document.getElementById('send-confirmation');

      // Show confirmation
      banner.style.display = 'block';
      btn.textContent = 'Sent!';
      btn.classList.add('sent');
      btn.disabled = true;

      // Disable inputs
      document.getElementById('crm-email-to').disabled = true;
      document.getElementById('crm-email-subject').disabled = true;
      document.getElementById('crm-email-body').disabled = true;
    });
  </script>
</body>
</html>
